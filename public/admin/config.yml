backend:
  name: github
  repo: Gurvikram-Randhawa/vikore-vana
  branch: main
  base_url: https://vikorevana.store
  auth_endpoint: api/auth

publish_mode: editorial_workflow
media_folder: public/uploads
public_folder: /uploads

site_url: https://vikorevana.store
display_url: https://vikorevana.store
logo_url: /uploads/vikore-vana-mark.svg

collections:
  - name: articles
    label: Articles
    folder: content/articles
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Category, name: category, widget: select, options: [Living Room, Bedroom, Kitchen, Bathroom, Small Spaces, Home Decor, Lighting, Indoor Plants, Luxury Decor] }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Cover Image, name: cover, widget: image }
      - { label: Featured, name: featured, widget: boolean, required: false, default: false }
      - { label: Draft, name: draft, widget: boolean, required: false, default: false }
      - { label: SEO Title, name: seoTitle, widget: string, required: false }
      - { label: SEO Description, name: seoDescription, widget: text, required: false }
      - { label: SEO Keywords, name: seoKeywords, widget: string, required: false }
      - { label: Recommended Product Slugs, name: products, widget: list, required: false }
      - { label: Article Body, name: body, widget: markdown }
  - name: products
    label: Products
    folder: content/products
    create: true
    slug: "{{slug}}"
    summary: "{{name}} — {{category}}"
    fields:
      - { label: Product Name, name: name, widget: string }
      - { label: Date Added, name: date, widget: datetime, required: true }
      - { label: Product Description, name: description, widget: text }
      - { label: Product Image Upload, name: image, widget: image }
      - { label: Affiliate Link, name: affiliate, widget: string }
      - { label: Category, name: category, widget: select, options: [Living Room, Bedroom, Kitchen, Bathroom, Small Spaces, Home Decor, Lighting, Indoor Plants, Luxury Decor] }
      - { label: Featured, name: featured, widget: boolean, required: false, default: false }
      - { label: Notes, name: body, widget: markdown, required: false }
  - name: looks
    label: Shop the Look
    folder: content/looks
    create: true
    extension: json
    format: json
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Main Image, name: image, widget: image }
      - label: Hotspots
        name: hotspots
        widget: list
        summary: "{{fields.productName}}"
        fields:
          - { label: ID, name: id, widget: string, default: "spot-1" }
          - { label: X Coordinate (Percentage from left), name: x, widget: number, value_type: float, min: 0, max: 100 }
          - { label: Y Coordinate (Percentage from top), name: y, widget: number, value_type: float, min: 0, max: 100 }
          - { label: Product Name, name: productName, widget: string }
          - { label: Price, name: price, widget: string }
          - { label: Category, name: category, widget: string }
          - { label: Product Slug (Internal link), name: slug, widget: string, required: false }
          - { label: Affiliate Link (External URL), name: affiliate, widget: string, required: false }
          - { label: Thumbnail Image, name: image, widget: image }
