<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Vikore Vana CMS</title>
  </head>
  <body>
    <script>
      // Must be set before loading decap-cms.js
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      CMS.init({
        config: {
          backend: {
            name: "github",
            repo: "Gurvikram-Randhawa/vikore-vana",
            branch: "main",
            base_url: "https://vikorevana.store",
            auth_endpoint: "api/auth"
          },
          publish_mode: "editorial_workflow",
          media_folder: "public/uploads",
          public_folder: "/uploads",
          local_backend: true,
          site_url: "https://vikorevana.store",
          display_url: "https://vikorevana.store",
          logo_url: "/uploads/vikore-vana-mark.svg",
          collections: [
            {
              name: "articles",
              label: "Articles",
              folder: "content/articles",
              create: true,
              slug: "{{slug}}",
              summary: "{{title}} — {{category}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Description", name: "description", widget: "text" },
                { label: "Category", name: "category", widget: "select", options: ["Living Room", "Bedroom", "Kitchen", "Bathroom", "Small Spaces", "Home Decor", "Lighting", "Indoor Plants", "Luxury Decor"] },
                { label: "Publish Date", name: "date", widget: "datetime" },
                { label: "Cover Image", name: "cover", widget: "image" },
                { label: "Featured", name: "featured", widget: "boolean", required: false, default: false },
                { label: "Draft", name: "draft", widget: "boolean", required: false, default: false },
                { label: "SEO Title", name: "seoTitle", widget: "string", required: false },
                { label: "SEO Description", name: "seoDescription", widget: "text", required: false },
                { label: "SEO Keywords", name: "seoKeywords", widget: "string", required: false },
                { label: "Recommended Product Slugs", name: "products", widget: "list", required: false },
                { label: "Article Body", name: "body", widget: "markdown" }
              ]
            },
            {
              name: "products",
              label: "Products",
              folder: "content/products",
              create: true,
              slug: "{{slug}}",
              summary: "{{name}} — {{category}}",
              fields: [
                { label: "Product Name", name: "name", widget: "string" },
                { label: "Product Description", name: "description", widget: "text" },
                { label: "Product Image Upload", name: "image", widget: "image" },
                { label: "Affiliate Link", name: "affiliate", widget: "string" },
                { label: "Category", name: "category", widget: "select", options: ["Living Room", "Bedroom", "Kitchen", "Bathroom", "Small Spaces", "Home Decor", "Lighting", "Indoor Plants", "Luxury Decor"] },
                { label: "Featured", name: "featured", widget: "boolean", required: false, default: false },
                { label: "Notes", name: "body", widget: "markdown", required: false }
              ]
            },
            {
              name: "looks",
              label: "Shop the Look",
              folder: "content/looks",
              create: true,
              extension: "json",
              format: "json",
              slug: "{{slug}}",
              summary: "{{title}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Main Image", name: "image", widget: "image" },
                {
                  label: "Hotspots",
                  name: "hotspots",
                  widget: "list",
                  summary: "{{fields.productName}}",
                  fields: [
                    { label: "ID", name: "id", widget: "string", default: "spot-1" },
                    { label: "X Coordinate (Percentage from left)", name: "x", widget: "number", value_type: "float", min: 0, max: 100 },
                    { label: "Y Coordinate (Percentage from top)", name: "y", widget: "number", value_type: "float", min: 0, max: 100 },
                    { label: "Product Name", name: "productName", widget: "string" },
                    { label: "Price", name: "price", widget: "string", required: false },
                    { label: "Product Slug (Internal link)", name: "slug", widget: "string", required: false },
                    { label: "Affiliate Link (External URL)", name: "affiliate", widget: "string", required: false },
                    { label: "Thumbnail Image", name: "image", widget: "image" }
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
    <script>
      // Visual Hotspot Mapper for Decap CMS
      document.addEventListener('DOMContentLoaded', () => {
        const observer = new MutationObserver(() => {
          // Look for labels that contain "X Coordinate"
          const xLabels = Array.from(document.querySelectorAll('label')).filter(l => l.textContent.includes('X Coordinate (Percentage from left)'));
          
          xLabels.forEach(xLabel => {
            const fieldWrapper = xLabel.parentElement;
            if (!fieldWrapper || fieldWrapper.dataset.hasPicker) return;
            
            fieldWrapper.dataset.hasPicker = 'true';
            
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.innerHTML = '📍 Pick on Image';
            btn.style.cssText = 'display: block; margin-top: 8px; margin-bottom: 16px; padding: 8px 12px; background: #1e293b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; transition: background 0.2s;';
            btn.onmouseover = () => btn.style.background = '#334155';
            btn.onmouseout = () => btn.style.background = '#1e293b';
            
            btn.onclick = (e) => {
              e.preventDefault();
              
              // Find the main image URL by looking for the "Main Image" label's preview image
              const mainImageLabel = Array.from(document.querySelectorAll('label')).find(l => l.textContent.includes('Main Image'));
              let imgSrc = '';
              if (mainImageLabel) {
                // The image preview is usually next to the label in the same control block
                const controlBlock = mainImageLabel.parentElement.parentElement;
                const img = controlBlock ? controlBlock.querySelector('img') : null;
                if (img) imgSrc = img.src;
              }
              
              if (!imgSrc) {
                alert('Please upload and select a Main Image first (and wait for the preview to load) before placing hotspots!');
                return;
              }
              
              // Create full-screen overlay
              const overlay = document.createElement('div');
              overlay.style.cssText = 'position: fixed; inset: 0; background: rgba(15, 23, 42, 0.95); z-index: 999999; display: flex; align-items: center; justify-content: center; flex-direction: column; cursor: crosshair; backdrop-filter: blur(8px);';
              
              const title = document.createElement('h3');
              title.textContent = 'Tap anywhere on the image to place the hotspot';
              title.style.cssText = 'color: white; margin-bottom: 24px; font-family: ui-sans-serif, system-ui, sans-serif; font-weight: 500; font-size: 18px; text-shadow: 0 2px 10px rgba(0,0,0,0.5);';
              
              const imgWrapper = document.createElement('div');
              imgWrapper.style.cssText = 'position: relative; max-width: 90vw; max-height: 80vh; border-radius: 12px; overflow: hidden; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.75);';
              
              const img = document.createElement('img');
              img.src = imgSrc;
              img.style.cssText = 'max-width: 100%; max-height: 80vh; display: block; object-fit: contain;';
              
              const closeBtn = document.createElement('button');
              closeBtn.innerHTML = '✕ Cancel';
              closeBtn.style.cssText = 'position: absolute; top: 24px; right: 24px; padding: 10px 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s;';
              closeBtn.onmouseover = () => closeBtn.style.background = 'rgba(255,255,255,0.2)';
              closeBtn.onmouseout = () => closeBtn.style.background = 'rgba(255,255,255,0.1)';
              closeBtn.onclick = () => document.body.removeChild(overlay);
              
              imgWrapper.appendChild(img);
              overlay.appendChild(closeBtn);
              overlay.appendChild(title);
              overlay.appendChild(imgWrapper);
              
              img.onclick = (event) => {
                const rect = img.getBoundingClientRect();
                const x = ((event.clientX - rect.left) / rect.width) * 100;
                const y = ((event.clientY - rect.top) / rect.height) * 100;
                
                const xInputId = xLabel.getAttribute('for');
                const xInput = xInputId ? document.getElementById(xInputId) : xLabel.parentElement.querySelector('input');
                
                // Bulletproof way to find the sibling Y Coordinate label
                const allYLabels = Array.from(document.querySelectorAll('label')).filter(l => l.textContent.includes('Y Coordinate'));
                let yLabel = null;
                let maxShared = 0;
                allYLabels.forEach(y => {
                  let p = y.parentElement;
                  let shared = 0;
                  while(p && p !== document.body) {
                    if (p.contains(xLabel)) shared++;
                    p = p.parentElement;
                  }
                  if (shared > maxShared) {
                    maxShared = shared;
                    yLabel = y;
                  }
                });
                
                const yInputId = yLabel ? yLabel.getAttribute('for') : null;
                const yInput = yInputId ? document.getElementById(yInputId) : (yLabel ? yLabel.parentElement.querySelector('input') : null);
                
                if (xInput && yInput) {
                  // The ultimate React 16+ input setter using internal fiber props
                  const setReactValue = (input, val) => {
                    // First set the DOM value
                    const nativeInputValueSetter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
                    nativeInputValueSetter.call(input, val);
                    
                    // Dispatch standard events just in case
                    input.dispatchEvent(new Event('input', { bubbles: true }));
                    input.dispatchEvent(new Event('change', { bubbles: true }));
                    
                    // The absolute bulletproof way: call React's internal onChange directly
                    const reactPropsKey = Object.keys(input).find(key => key.startsWith('__reactProps$'));
                    if (reactPropsKey && input[reactPropsKey] && input[reactPropsKey].onChange) {
                      // Create a synthetic-like event object that React expects
                      input[reactPropsKey].onChange({ 
                        target: { value: val, type: 'number' },
                        currentTarget: { value: val, type: 'number' },
                        preventDefault: () => {},
                        stopPropagation: () => {}
                      });
                    }
                  };
                  
                  setReactValue(xInput, x.toFixed(2));
                  setReactValue(yInput, y.toFixed(2));
                } else {
                  console.warn('Could not find the X/Y input fields to auto-fill.');
                }
                
                document.body.removeChild(overlay);
              };
              
              document.body.appendChild(overlay);
            };
            
            fieldWrapper.appendChild(btn);
          });
        });
        
        observer.observe(document.body, { childList: true, subtree: true });
      });
    </script>
  </body>
</html>
